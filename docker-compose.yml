version: '3.8'

services:
  # PostgreSQL 데이터베이스
  db:
    image: pgvector/pgvector:pg18
    container_name: lm_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "15432:5432"
    networks:
      - lm_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lm_postgres -d live_meeting" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI 백엔드
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lm_backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
      - ./media:/app/media
      - ./exports:/app/exports
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lm_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]

  # Local STT Engine (Whisper) - 주석 처리: 백엔드에서 직접 Whisper 모델 실행
  # stt:
  #   image: onerahmet/openai-whisper-asr-webservice:latest-gpu
  #   container_name: lm_stt
  #   restart: always
  #   environment:
  #     - ASR_MODEL=medium
  #     - ASR_ENGINE=openai_whisper
  #   volumes:
  #     - ai_models:/root/.cache/whisper
  #   ports:
  #     - "9000:9000"
  #   networks:
  #     - lm_network
  #   deploy:
  #     resources:
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: 1
  #             capabilities: [ gpu ]

  # Local LLM Engine (Ollama/vLLM placeholder)
  llm:
    image: ollama/ollama:latest
    container_name: lm_llm
    restart: always
    environment:
      - OLLAMA_KEEP_ALIVE=0
    volumes:
      - ./ai_models:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - lm_network
    # GPU 할당 제거 (CPU 모드로 실행하여 VRAM 절약)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [ gpu ]
    # Nginx (선택 사항 - 프로덕션용)
    # nginx:
    #   image: nginx:alpine
    #   container_name: lm_nginx
    #   restart: always
    #   ports:
    #     - "80:80"
    #     - "443:443"
    #   volumes:
    #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    #     - ./frontend:/usr/share/nginx/html
    #   depends_on:
    #     - backend
    #   networks:
    #     - lm_network

volumes:
  postgres_data:
    driver: local
  ai_models:
    driver: local

networks:
  lm_network:
    driver: bridge
