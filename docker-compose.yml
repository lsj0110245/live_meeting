version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: pgvector/pgvector:pg18
    container_name: lm_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "15432:5432"
    networks:
      - lm_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lm_backend
    restart: always
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./media:/app/media
      - ./exports:/app/exports
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - lm_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
  # Nginx (Optional - for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: lm_nginx
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf
  #     - ./frontend:/usr/share/nginx/html
  #   depends_on:
  #     - backend
  #   networks:
  #     - lm_network

volumes:
  postgres_data:
    driver: local

networks:
  lm_network:
    driver: bridge
