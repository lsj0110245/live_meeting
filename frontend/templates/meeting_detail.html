{% extends "base.html" %}

{% block title %}회의 상세 - LiveMeeting{% endblock %}

{% block content %}
<div class="header-actions" style="margin-bottom: 20px;">
    <a href="/" class="btn btn-outline" style="border:none; padding-left:0;"><i class="fa-solid fa-arrow-left"></i>
        목록으로</a>
</div>

<div class="meeting-container">
    <!-- 왼쪽: 메타데이터 & 요약 -->
    <div class="left-panel">
        <div class="card meeting-info">
            <h1 id="meeting-title">Loading...</h1>
            <p id="meeting-date" class="date-text"></p>
            <p id="meeting-desc" class="desc-text"></p>

            <div class="actions">
                <button id="btn-summary" class="btn"><i class="fa-solid fa-wand-magic-sparkles"></i> 회의록 생성</button>
                <div class="dropdown">
                    <button class="btn btn-outline"><i class="fa-solid fa-download"></i> 내보내기</button>
                    <div class="dropdown-content">
                        <a href="javascript:void(0)" onclick="exportMeeting('csv')">CSV 다운로드</a>
                        <a href="javascript:void(0)" onclick="exportMeeting('xlsx')">Excel 다운로드</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="card summary-section">
            <h3><i class="fa-solid fa-file-lines"></i> AI 회의록 요약</h3>
            <div id="summary-content" class="summary-content">
                <p class="placeholder-text">회의록이 아직 생성되지 않았습니다.</p>
            </div>
        </div>
    </div>

    <!-- 오른쪽: 오디오 & 전사 스크립트 -->
    <div class="right-panel">
        <div class="card player-card">
            <audio id="audio-player" controls style="width: 100%;"></audio>
        </div>

        <div class="card transcript-card">
            <h3>전사 스크립트</h3>
            <div id="transcript-list" class="transcript-list">
                <!-- 스크립트 아이템들이 여기에 추가됨 -->
                <p class="placeholder-text">전사 데이터를 불러오는 중...</p>
            </div>
        </div>
    </div>
</div>

<!-- 메타데이터 수정 모달 -->
{% include "components/metadata_modal.html" %}
{% endblock %}

{% block scripts %}
<script src="/static/js/meeting.js?v={{ range(1, 10000) | random }}"></script>
{% endblock %}
