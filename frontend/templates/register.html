{% extends "base.html" %}

{% block title %}회원가입 - LiveMeeting{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="card auth-card">
        <h2>회원가입</h2>
        <p class="subtitle">새로운 계정을 생성하세요.</p>

        <form id="register-form">
            <div class="form-group">
                <label>이메일</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" placeholder="user@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>이름</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="username" placeholder="홍길동" required>
                </div>
            </div>

            <div class="form-group">
                <label>비밀번호</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" placeholder="비밀번호 입력 (8자 이상)" required minlength="8">
                </div>
            </div>

            <div class="form-group">
                <label>비밀번호 확인</label>
                <div class="input-wrapper">
                    <i class="fa-solid fa-check-circle"></i>
                    <input type="password" id="password-confirm" placeholder="비밀번호 재입력" required>
                </div>
            </div>

            <button type="submit" class="btn btn-full">가입하기</button>
        </form>

        <div class="auth-footer">
            이미 계정이 있으신가요? <a href="/login">로그인</a>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/auth.js"></script>
{% endblock %}
